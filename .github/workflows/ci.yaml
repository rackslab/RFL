---
name: Automated Tests
permissions:
  contents: read
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  tests:
    strategy:
      matrix:
        os: ["ubuntu-latest"]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install tests dependencies
        run: |
          sudo apt-get install -y build-essential python3-dev libldap2-dev libsasl2-dev
          python -m pip install --upgrade pip
          pip install pytest

      # The version of setuptools in python 3.8 environment does not support PEP 639
      # license metadata format. Patch pyproject.toml for this version to restore old
      # deprecated format.
      - name: Patch license metadata (Python 3.8)
        if: ${{ matrix.python-version == '3.8' }}
        run: |
          sed -i 's/^license = \(".*"\)/license = {text = \1}/' pyproject.toml src/*/pyproject.toml

      - name: Install application
        run: |
          pip install src/core "src/authentication[all]" src/build src/log src/permissions src/settings src/web

      - name: Run tests
        run: pytest --import-mode=importlib

  os_rpm_tests:
    name: OS integration tests (rpm)
    strategy:
      fail-fast: false
      matrix:
        envs:
        - container: rockylinux/rockylinux:8
          epel: 8
          repo: powertools
        - container: rockylinux/rockylinux:9
          epel: 9
          rackslab-repo: el9
          repo: crb
        - container: rockylinux/rockylinux:10
          epel: 10
          rackslab-repo: el10
          repo: crb
        - container: fedora:latest
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.envs.container }}
    steps:
      - uses: actions/checkout@v6

      - name: Enable EPEL repository (Rocky Linux)
        if: ${{ startsWith(matrix.envs.container, 'rockylinux') }}
        run: |
          dnf -y install 'dnf-command(config-manager)'
          dnf config-manager --set-enabled ${{ matrix.envs.repo }}
          dnf -y install https://dl.fedoraproject.org/pub/epel/epel-release-latest-${{ matrix.envs.epel }}.noarch.rpm

      - name: Install tests dependencies
        run: |
          dnf -y install \
            python3-flask \
            python3-jwt \
            python3-ldap \
            python3-pip \
            python3-pytest \
            python3-PyYAML \
            python3-tomli

      # el8 and EPEL8 don't ship Authlib, it is only available in more recent
      # versions. Skip installation on this distribution (along with requests,
      # soft dependency of Authlib).
      # OIDC tests are automatically skipped when Authlib is not installed.
      - name: Install OIDC dependencies
        if: ${{ matrix.envs.container != 'rockylinux/rockylinux:8' }}
        run: dnf -y install python3-authlib python3-requests

      # pip and setuptools on Rocky Linux 8 do not fully support PEP 517 builds from
      # pyproject.toml; enable PEP517_SETUP_WRAPPER on this distribution only.
      - name: Install application
        env:
          PEP517_SETUP_WRAPPER: ${{ matrix.envs.container == 'rockylinux/rockylinux:8' && '1' || '' }}
        run: NODEPS=1 PIP=pip3 bash install.sh

      # Unfortunately, pytest on rocky8 does not support
      # --import-mode=importlib. On this old version, explicitely test all
      # packages individually.
      - name: Run tests (rocky8)
        if: ${{ matrix.envs.container == 'rockylinux/rockylinux:8' }}
        run: |
          pytest-3 src/core
          pytest-3 src/authentication
          pytest-3 src/build
          pytest-3 src/log
          pytest-3 src/permissions
          pytest-3 src/settings
          pytest-3 src/web

      - name: Run tests
        if: ${{ matrix.envs.container != 'rockylinux/rockylinux:8' }}
        run: pytest-3 --import-mode=importlib

  os_deb_tests:
    name: OS integration tests (deb)
    strategy:
      fail-fast: false
      matrix:
        envs:
        - container: debian:stable
        - container: debian:testing
        - container: debian:unstable
        - container: ubuntu:noble
        - container: ubuntu:resolute
        - container: ubuntu:jammy
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.envs.container }}
    steps:
      - uses: actions/checkout@v6

      - name: Install tests dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt update
          apt install -y \
            python3-authlib \
            python3-flask \
            python3-jwt \
            python3-ldap \
            python3-pip \
            python3-pytest \
            python3-requests \
            python3-tomli \
            python3-yaml \
            python3-venv

      # pip and setuptools on Ubuntu Jammy do not fully support PEP 517 builds from
      # pyproject.toml; enable PEP517_SETUP_WRAPPER on this distribution only.
      - name: Install application
        env:
          PEP517_SETUP_WRAPPER: ${{ matrix.envs.container == 'ubuntu:jammy' && '1' || '' }}
        run: |
          python3 -m venv --system-site-packages ~/venv
          NODEPS=1 EDITABLE=1 PIP=~/venv/bin/pip bash install.sh

      - name: Run tests
        run: ~/venv/bin/python3 -m pytest --import-mode=importlib

  os_suse_tests:
    name: OS integration tests (suse)
    strategy:
      fail-fast: false
      matrix:
        envs:
        - container: opensuse/leap:15
        - container: opensuse/leap:16.0
        - container: opensuse/tumbleweed
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.envs.container }}
    steps:
      # Minimal openSUSE Leap 15 image does not ship tar/gzip; actions/checkout
      # needs them to extract the downloaded repository archive (.tar.gz).
      - name: Install checkout dependencies (Leap 15)
        if: ${{ matrix.envs.container == 'opensuse/leap:15' }}
        run: zypper -n ref && zypper -n in tar gzip

      - uses: actions/checkout@v6

      - name: Install tests dependencies
        run: |
          zypper -n ref
          zypper -n in \
            python3 \
            python3-pip \
            python3-pytest \
            python3-Flask \
            python3-PyJWT \
            python3-ldap \
            python3-PyYAML \
            python3-tomli

      # openSUSE Leap 15 doesn't ship Authlib, it is only available in more
      # recent versions. Skip installation on this distribution (along with
      # requests, soft dependency of Authlib).
      # OIDC tests are automatically skipped when Authlib is not installed.
      - name: Install OIDC dependencies
        if: ${{ matrix.envs.container != 'opensuse/leap:15' }}
        run: zypper -n in python3-Authlib python3-requests

      # Leap 15 ships Python 3.6; wheel is required for pip builds.
      - name: Install python3-wheel (Leap 15)
        if: ${{ matrix.envs.container == 'opensuse/leap:15' }}
        run: zypper -n in python3-wheel

      - name: Create virtual environment
        run: python3 -m venv --system-site-packages ~/venv

      # pip on openSUSE Leap 15 (Python 3.6) does not fully support PEP 517 builds from
      # pyproject.toml; enable PEP517_SETUP_WRAPPER on this distribution only.
      - name: Install application
        env:
          PEP517_SETUP_WRAPPER: ${{ matrix.envs.container == 'opensuse/leap:15' && '1' || '' }}
        run: NODEPS=1 PIP=~/venv/bin/pip bash install.sh

      # Unfortunately, pytest on Leap 15 does not support --import-mode=importlib.
      # On this old version, explicitly test all packages individually.
      - name: Run tests (Leap 15)
        if: ${{ matrix.envs.container == 'opensuse/leap:15' }}
        run: |
          ~/venv/bin/python3 -m pytest src/core
          ~/venv/bin/python3 -m pytest src/authentication
          ~/venv/bin/python3 -m pytest src/build
          ~/venv/bin/python3 -m pytest src/log
          ~/venv/bin/python3 -m pytest src/permissions
          ~/venv/bin/python3 -m pytest src/settings
          ~/venv/bin/python3 -m pytest src/web

      - name: Run tests
        if: ${{ matrix.envs.container != 'opensuse/leap:15' }}
        run: ~/venv/bin/python3 -m pytest --import-mode=importlib
